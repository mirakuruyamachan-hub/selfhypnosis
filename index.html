<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>自己催眠アプリ ✦ 現役プロ催眠術師監修</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #06060f;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  min-height: 100vh;
  font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
  padding: 20px 0 40px;
}
#app {
  width: 100%;
  max-width: 480px;
  min-height: 600px;
  background: #0a0a1a;
  border-radius: 16px;
  overflow: hidden;
  color: #fff;
  position: relative;
}
#menu-screen { padding: 24px 20px 12px; }
.app-title {
  text-align: center; font-size: 22px; font-weight: 500;
  color: #c8b4ff; letter-spacing: 0.1em; margin-bottom: 4px;
}
.app-subtitle {
  text-align: center; font-size: 12px; color: #8870cc;
  margin-bottom: 20px; letter-spacing: 0.05em;
}
.menu-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 10px; margin-bottom: 12px;
}
.menu-btn {
  background: #13112a; border: 0.5px solid #3a2e6e;
  border-radius: 12px; padding: 14px 10px; cursor: pointer;
  text-align: center; transition: background 0.2s, border-color 0.2s, transform 0.1s;
  display: flex; flex-direction: column; align-items: center; gap: 6px;
}
.menu-btn:hover { background: #1e1845; border-color: #7b5fff; transform: scale(1.02); }
.menu-btn:active { transform: scale(0.98); }
.menu-btn .icon { font-size: 24px; line-height: 1; }
.menu-btn .label { font-size: 13px; font-weight: 500; color: #d0c4ff; }
.menu-btn .desc { font-size: 11px; color: #7060a0; line-height: 1.3; }
.notice-box {
  background: #0d0b20; border: 0.5px solid #2a2050;
  border-radius: 10px; padding: 10px 14px;
  font-size: 10px; color: #5a4f80; line-height: 1.6;
  margin-bottom: 10px;
}
.notice-box strong { color: #8070a0; font-weight: 500; }
.credit {
  text-align: center; font-size: 11px;
  color: #4a3f70; letter-spacing: 0.08em; padding-bottom: 4px;
}
.credit span { color: #7060a0; }

#session-screen {
  display: none;
  position: absolute; inset: 0; background: #000;
  flex-direction: column; align-items: center; justify-content: center;
}
#canvas-container {
  position: relative; width: 280px; height: 280px; flex-shrink: 0;
}
#hcanvas {
  border-radius: 50%; display: block;
  position: absolute; inset: 0;
}
#suggestion-overlay {
  position: absolute; inset: 0; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  background: radial-gradient(ellipse at center, rgba(0,0,0,0.55) 40%, transparent 100%);
  pointer-events: none; z-index: 10;
}
#suggestion-text {
  font-size: 20px; font-weight: 600; color: #fff;
  text-align: center; line-height: 1.6; padding: 0 20px;
  letter-spacing: 0.05em;
  text-shadow: 0 0 20px rgba(180,140,255,0.9), 0 0 40px rgba(120,80,255,0.6), 0 2px 8px rgba(0,0,0,0.8);
  opacity: 0; transition: opacity 1.2s ease; white-space: pre-line;
}
.session-title {
  font-size: 16px; font-weight: 500; color: #c8b4ff;
  margin: 14px 0 3px; letter-spacing: 0.08em; text-align: center;
}
.freq-badge {
  font-size: 11px; color: #5a4a90;
  margin-top: 3px; text-align: center; letter-spacing: 0.05em;
}
.session-credit {
  font-size: 10px; color: #2a2050;
  margin-top: 10px; letter-spacing: 0.08em; text-align: center;
}
.stop-btn {
  margin-top: 10px; background: transparent;
  border: 0.5px solid #3a2e6e; border-radius: 20px;
  padding: 10px 32px; color: #8070b0; font-size: 13px;
  cursor: pointer; transition: all 0.2s;
}
.stop-btn:hover { background: #1a1535; color: #c8b4ff; border-color: #7b5fff; }
</style>
</head>
<body>
<div id="app">
  <div id="menu-screen">
    <div class="app-title">✦ 自己催眠アプリ ✦</div>
    <div class="app-subtitle">現役プロ催眠術師監修</div>
    <div class="menu-grid">
      <button class="menu-btn" onclick="startSession('sleep')"><span class="icon">🌙</span><span class="label">睡眠導入</span><span class="desc">深いリラックスへ誘う</span></button>
      <button class="menu-btn" onclick="startSession('relax')"><span class="icon">🌊</span><span class="label">緊張緩和</span><span class="desc">ストレスを手放す</span></button>
      <button class="menu-btn" onclick="startSession('motivation')"><span class="icon">⚡</span><span class="label">やる気スイッチ</span><span class="desc">集中力を高める</span></button>
      <button class="menu-btn" onclick="startSession('tasty')"><span class="icon">🍽️</span><span class="label">美味しくなる</span><span class="desc">食の喜びを増幅</span></button>
      <button class="menu-btn" onclick="startSession('sweet')"><span class="icon">🍯</span><span class="label">味が甘くなる</span><span class="desc">甘みを感じやすくする</span></button>
      <button class="menu-btn" onclick="startSession('rich')"><span class="icon">🌶️</span><span class="label">味が濃くなる</span><span class="desc">風味を引き出す</span></button>
      <button class="menu-btn" onclick="startSession('focus')"><span class="icon">🎯</span><span class="label">集中モード</span><span class="desc">雑念を取り除く</span></button>
      <button class="menu-btn" onclick="startSession('confidence')"><span class="icon">🌟</span><span class="label">自信を高める</span><span class="desc">内なる力を引き出す</span></button>
      <button class="menu-btn" onclick="startSession('pain')"><span class="icon">🌿</span><span class="label">痛み緩和</span><span class="desc">不快感を和らげる</span></button>
      <button class="menu-btn" onclick="startSession('reset')"><span class="icon">♻️</span><span class="label">催眠リセット</span><span class="desc">催眠を解く</span></button>
    </div>
    <div class="notice-box">
      <strong>【ご注意事項】</strong><br>
      ・本アプリは催眠効果を引き出すものであり、治療行為ではありません。<br>
      ・効果を感じない場合は、かかりつけの医療機関へご相談ください。<br>
      ・体調が悪くなった場合は直ちに使用をおやめください。<br>
      ・効果の有無についての責任は負いかねます。ご使用は自己責任でお願いします。
    </div>
    <div class="credit">提供　<span>龍馬の手</span></div>
  </div>

  <div id="session-screen">
    <div id="canvas-container">
      <canvas id="hcanvas" width="280" height="280"></canvas>
      <div id="suggestion-overlay">
        <div id="suggestion-text"></div>
      </div>
    </div>
    <div class="session-title" id="session-title"></div>
    <div class="freq-badge" id="freq-badge"></div>
    <div class="session-credit">提供　龍馬の手</div>
    <button class="stop-btn" onclick="stopSession()">✦ 終了する</button>
  </div>
</div>

<script>
var sessions = {
  sleep: {
    title: '🌙 睡眠導入', freq: 4, freqName: 'シータ波',
    color: ['#1a0a4a','#4a1a8a','#8a3aff','#c89aff'], pattern: 'spiral', speed: 0.3,
    messages: ['まぶたが\n重くなります…','全身の力が\n抜けていきます…','深い眠りへ\n沈んでいきます…','安らかな\n眠りに包まれます…','ゆっくりと\n目を閉じてください…']
  },
  relax: {
    title: '🌊 緊張緩和', freq: 8, freqName: 'アルファ波',
    color: ['#001a3a','#0a4a7a','#1a8aaa','#4ad4ff'], pattern: 'wave', speed: 0.4,
    messages: ['息をゆっくり\n吐いてください…','肩の力が\n抜けていきます…','心が静まって\nいきます…','穏やかな平和が\n広がります…','全ての緊張が\n溶けていきます…']
  },
  motivation: {
    title: '⚡ やる気スイッチ', freq: 40, freqName: 'ガンマ波',
    color: ['#1a1000','#4a3000','#c87a00','#ffd040'], pattern: 'pulse', speed: 1.2,
    messages: ['エネルギーが\n高まります…','意欲が\n湧き上がります…','やる気スイッチが\nONになります！','集中力が\n最大になります…','あなたには\nできる力があります！']
  },
  tasty: {
    title: '🍽️ 美味しくなる', freq: 10, freqName: 'アルファ波',
    color: ['#1a0a00','#4a2000','#c84a10','#ff8060'], pattern: 'bloom', speed: 0.5,
    messages: ['味覚が\n研ぎ澄まされます…','一口一口が\n特別な体験に…','食の喜びが\n広がります…','美味しさが\n何倍にもなります…','食事が\n至福の時間になります…']
  },
  sweet: {
    title: '🍯 味が甘くなる', freq: 10, freqName: 'アルファ波',
    color: ['#1a0d00','#5a2a00','#e08020','#ffd080'], pattern: 'ripple', speed: 0.5,
    messages: ['口の中に\n甘みが広がります…','優しい甘さを\n感じてください…','蜂蜜のような\n甘みに包まれます…','甘さが\n全身に溶け込みます…','すべてが\n甘く感じられます…']
  },
  rich: {
    title: '🌶️ 味が濃くなる', freq: 14, freqName: 'アルファ波',
    color: ['#1a0000','#500010','#c01030','#ff4060'], pattern: 'star', speed: 0.7,
    messages: ['風味が\n深まります…','口いっぱいに\n広がる味わい…','豊かなコクを\n感じます…','食の深みが\n増していきます…','すべての味が\n濃くなります…']
  },
  focus: {
    title: '🎯 集中モード', freq: 20, freqName: 'ベータ波',
    color: ['#000a1a','#001a4a','#0050c0','#40a0ff'], pattern: 'grid', speed: 0.9,
    messages: ['雑念が\n消えていきます…','意識が\n研ぎ澄まされます…','目の前のことだけに\n集中します…','思考が\nクリアになります…','最高の\nパフォーマンスへ…']
  },
  confidence: {
    title: '🌟 自信を高める', freq: 10, freqName: 'アルファ波',
    color: ['#1a1500','#4a3a00','#c0a000','#ffe040'], pattern: 'bloom', speed: 0.5,
    messages: ['あなたには\n力があります…','自分を\n信じてください…','内なる輝きが\n増します…','可能性が\n広がっていきます…','あなたは\n素晴らしい存在です…']
  },
  pain: {
    title: '🌿 痛み緩和', freq: 6, freqName: 'シータ波',
    color: ['#001a10','#004a30','#00a060','#40f0b0'], pattern: 'spiral', speed: 0.25,
    messages: ['体が\nリラックスします…','不快感が\n和らいでいきます…','心地よい感覚に\n包まれます…','体が楽に\nなっていきます…','痛みが\n遠ざかっていきます…']
  },
  reset: {
    title: '♻️ 催眠リセット', freq: 20, freqName: 'ベータ波',
    color: ['#0a0a0a','#303030','#888888','#ffffff'], pattern: 'reset', speed: 1.0,
    messages: ['意識が\n戻ってきます…','体の感覚が\n戻ります…','すっきりと\n目覚めます…','催眠が\n解けていきます…','普通の状態に\n戻りました。']
  }
};

var FADE_DURATION = 1200, SHOW_DURATION = 3000;
var animId, audioCtx, oscillators = [], msgTimer = null;
var t = 0, currentMsgIdx = 0, currentSession = null;

function showNextMessage() {
  var el = document.getElementById('suggestion-text');
  el.style.opacity = '0';
  setTimeout(function() {
    currentMsgIdx = (currentMsgIdx + 1) % currentSession.messages.length;
    el.textContent = currentSession.messages[currentMsgIdx];
    el.style.opacity = '1';
    msgTimer = setTimeout(showNextMessage, SHOW_DURATION + FADE_DURATION);
  }, FADE_DURATION);
}

function startSession(type) {
  currentSession = sessions[type];
  var s = currentSession;
  document.getElementById('menu-screen').style.display = 'none';
  document.getElementById('session-screen').style.display = 'flex';
  document.getElementById('session-title').textContent = s.title;
  document.getElementById('freq-badge').textContent = '🎵 特殊周波数: ' + s.freq + 'Hz (' + s.freqName + ')';
  currentMsgIdx = 0;
  var el = document.getElementById('suggestion-text');
  el.style.transition = 'none';
  el.style.opacity = '0';
  el.textContent = s.messages[0];
  setTimeout(function() {
    el.style.transition = 'opacity ' + FADE_DURATION + 'ms ease';
    el.style.opacity = '1';
    msgTimer = setTimeout(showNextMessage, SHOW_DURATION + FADE_DURATION);
  }, 300);
  startAudio(s.freq);
  startCanvas(s);
}

function startAudio(freq) {
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    var gain = audioCtx.createGain();
    gain.gain.setValueAtTime(0.06, audioCtx.currentTime);
    gain.connect(audioCtx.destination);
    var oL = audioCtx.createOscillator(), oR = audioCtx.createOscillator();
    var merger = audioCtx.createChannelMerger(2);
    oL.frequency.value = 200; oR.frequency.value = 200 + freq;
    oL.type = oR.type = 'sine';
    var gL = audioCtx.createGain(), gR = audioCtx.createGain();
    gL.gain.value = gR.gain.value = 0.5;
    oL.connect(gL); oR.connect(gR);
    gL.connect(merger, 0, 0); gR.connect(merger, 0, 1);
    merger.connect(gain);
    oL.start(); oR.start();
    oscillators = [oL, oR];
  } catch(e) {}
}

function startCanvas(s) {
  var canvas = document.getElementById('hcanvas');
  var ctx = canvas.getContext('2d');
  t = 0;
  function draw() {
    t += s.speed * 0.015;
    ctx.clearRect(0,0,280,280);
    var cx=140, cy=140, c=s.color;
    if (s.pattern==='spiral') {
      ctx.fillStyle='#000010'; ctx.fillRect(0,0,280,280);
      for (var i=0;i<120;i++) {
        var a=(i/120)*Math.PI*12+t, r=(i/120)*120;
        var alpha=0.5+0.5*Math.sin(t*2+i*0.1);
        ctx.beginPath(); ctx.arc(cx+Math.cos(a)*r,cy+Math.sin(a)*r,2.5,0,Math.PI*2);
        ctx.fillStyle=c[Math.min(Math.floor((i/120)*(c.length-1)),c.length-1)]+Math.floor(alpha*200).toString(16).padStart(2,'0');
        ctx.fill();
      }
    } else if (s.pattern==='wave') {
      ctx.fillStyle='#000510'; ctx.fillRect(0,0,280,280);
      for (var ring=1;ring<=8;ring++) {
        var pts=Math.floor(ring*12); ctx.beginPath();
        for (var i=0;i<=pts;i++) {
          var a=(i/pts)*Math.PI*2, wave=Math.sin(a*3+t*(ring*0.5))*8;
          var rx=cx+Math.cos(a)*(ring*16+wave), ry=cy+Math.sin(a)*(ring*16+wave);
          i===0?ctx.moveTo(rx,ry):ctx.lineTo(rx,ry);
        }
        ctx.closePath();
        ctx.strokeStyle=c[Math.min(ring-1,c.length-1)]+Math.floor((0.15+0.1*Math.sin(t+ring))*255).toString(16).padStart(2,'0');
        ctx.lineWidth=1.5; ctx.stroke();
      }
    } else if (s.pattern==='pulse') {
      ctx.fillStyle='#050300'; ctx.fillRect(0,0,280,280);
      for (var ring=1;ring<=10;ring++) {
        var r=ring*13+Math.sin(t*3-ring*0.5)*6, alpha=0.4+0.4*Math.sin(t*4-ring*0.8);
        ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
        ctx.strokeStyle=c[Math.min(Math.floor(ring/3),c.length-1)]+Math.floor(alpha*255).toString(16).padStart(2,'0');
        ctx.lineWidth=2; ctx.stroke();
      }
    } else if (s.pattern==='ripple') {
      ctx.fillStyle='#080400'; ctx.fillRect(0,0,280,280);
      for (var i=0;i<6;i++) {
        var r=((t*40+i*46)%130)+10, alpha=1-r/140;
        ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
        ctx.strokeStyle=c[i%c.length]+Math.floor(alpha*200).toString(16).padStart(2,'0');
        ctx.lineWidth=2; ctx.stroke();
      }
    } else if (s.pattern==='bloom') {
      ctx.fillStyle='#080300'; ctx.fillRect(0,0,280,280);
      for (var p=0;p<8;p++) {
        var baseAngle=(p/8)*Math.PI*2+t*0.3, len=90+Math.sin(t*0.7+p)*20;
        ctx.beginPath(); ctx.moveTo(cx,cy);
        for (var j=0;j<=30;j++) {
          var a=baseAngle+(j/30-0.5)*(Math.PI/8)*2, r=Math.sin((j/30)*Math.PI)*len;
          ctx.lineTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);
        }
        ctx.closePath();
        ctx.fillStyle=c[p%c.length]+Math.floor((0.3+0.2*Math.sin(t+p))*255).toString(16).padStart(2,'0');
        ctx.fill();
      }
    } else if (s.pattern==='star') {
      ctx.fillStyle='#050000'; ctx.fillRect(0,0,280,280);
      for (var layer=0;layer<4;layer++) {
        var pts=6+layer*2; ctx.beginPath();
        for (var i=0;i<=pts*2;i++) {
          var a=(i/(pts*2))*Math.PI*2+t*(0.3+layer*0.1), r=(i%2===0)?30+layer*22:15+layer*10;
          i===0?ctx.moveTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r):ctx.lineTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);
        }
        ctx.closePath();
        ctx.strokeStyle=c[layer%c.length]+Math.floor((0.25+0.15*Math.sin(t*1.5+layer))*255).toString(16).padStart(2,'0');
        ctx.lineWidth=1.5; ctx.stroke();
      }
    } else if (s.pattern==='grid') {
      ctx.fillStyle='#000208'; ctx.fillRect(0,0,280,280);
      for (var gx=0;gx<=280;gx+=20) {
        var wave=Math.sin(gx/40+t*2)*4;
        ctx.beginPath(); ctx.moveTo(gx+wave,0); ctx.lineTo(gx-wave,280);
        ctx.strokeStyle=c[2]+Math.floor((0.08+0.06*Math.sin(gx/40+t))*255).toString(16).padStart(2,'0');
        ctx.lineWidth=0.5; ctx.stroke();
      }
      for (var gy=0;gy<=280;gy+=20) {
        var wave=Math.sin(gy/40+t*2)*4;
        ctx.beginPath(); ctx.moveTo(0,gy+wave); ctx.lineTo(280,gy-wave);
        ctx.strokeStyle=c[3]+Math.floor((0.08+0.06*Math.sin(gy/40+t))*255).toString(16).padStart(2,'0');
        ctx.lineWidth=0.5; ctx.stroke();
      }
      ctx.beginPath(); ctx.arc(cx,cy,40+Math.sin(t*2)*10,0,Math.PI*2);
      ctx.fillStyle=c[3]+'30'; ctx.fill();
    } else if (s.pattern==='reset') {
      ctx.fillStyle='#080808'; ctx.fillRect(0,0,280,280);
      for (var i=0;i<12;i++) {
        var a=(i/12)*Math.PI*2+t;
        ctx.beginPath(); ctx.arc(cx+Math.cos(a)*80,cy+Math.sin(a)*80,8,0,Math.PI*2);
        ctx.fillStyle='rgba(200,200,200,'+(i/12)*0.8+')'; ctx.fill();
      }
      ctx.beginPath(); ctx.arc(cx,cy,30+Math.sin(t*3)*5,0,Math.PI*2);
      ctx.fillStyle='#ffffff20'; ctx.fill();
    }
    animId = requestAnimationFrame(draw);
  }
  draw();
}

function stopSession() {
  cancelAnimationFrame(animId);
  clearTimeout(msgTimer);
  if (audioCtx) {
    oscillators.forEach(function(o) { try { o.stop(); } catch(e){} });
    audioCtx.close(); audioCtx = null; oscillators = [];
  }
  document.getElementById('suggestion-text').style.opacity = '0';
  document.getElementById('hcanvas').getContext('2d').clearRect(0,0,280,280);
  document.getElementById('session-screen').style.display = 'none';
  document.getElementById('menu-screen').style.display = 'block';
}
</script>
</body>
</html>
